<style>

<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   CT BRIDGE BIKES — application logic
   Backed by Supabase (shared database + file storage + login).
   See DEPLOY.md for one-time setup instructions.
   ========================================================= */
(function(){
"use strict";

/* ---------------------------------------------------------
   0. CONFIG — paste your project's values here (see DEPLOY.md)
--------------------------------------------------------- */
const SUPABASE_URL = 'https://fquhwgqlsnfihdkfhbpa.supabase.co';        // e.g. https://abcdefgh.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_UU7lEWmZ6KMl5JZK89BmNA_3jP6yG00';
const NOT_CONFIGURED = !SUPABASE_URL || SUPABASE_URL.indexOf('YOUR_SUPABASE_URL') !== -1
  || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf('YOUR_SUPABASE_ANON_KEY') !== -1;

let sb = null;
if(!NOT_CONFIGURED){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* ---------------------------------------------------------
   1. UTILITIES
--------------------------------------------------------- */
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function nl2br(str){ return escapeHtml(str).replace(/\n/g,'<br>'); }
function fmtPrice(n){ const num = Number(n)||0; return '$' + num.toLocaleString('en-US',{maximumFractionDigits:2}); }
function fmtDate(ts){ try{ return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e){ return ''; } }
function toast(msg, ms){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), ms||2600);
}
function friendlyError(error){
  if(!error) return 'Something went wrong.';
  const msg = error.message || String(error);
  if(/duplicate key|profiles_username/i.test(msg)) return 'That username is already taken.';
  if(/already registered/i.test(msg)) return 'That email already has an account — try logging in instead.';
  if(/invalid login credentials/i.test(msg)) return 'Incorrect email or password.';
  if(/unable to validate email|invalid email/i.test(msg)) return 'Please enter a valid email address.';
  if(/token has expired|invalid otp|invalid token|otp_expired/i.test(msg)) return 'That code is incorrect or expired — try resending it.';
  if(/password should be at least/i.test(msg)) return 'Password must be at least 6 characters.';
  return msg;
}

/* ---------------------------------------------------------
   2. STATE
--------------------------------------------------------- */
let cache = {
  session: null,
  profile: null,     // {id, username, role, joined}
  listings: [],
  home: [],
  shopInfo: {}
};
let settings = { theme: (localStorage.getItem('ctbb_theme') || 'light') };
let route = { tab:'home', listingId:null };
let uiCache = { pendingFiles:[], pendingPreviewUrls:[], editingHome:false, homeDraft:null, galleryIndex:0, busy:false };

function currentUser(){ return cache.profile ? { username: cache.profile.username, role: cache.profile.role } : null; }
function isAdmin(){ return !!cache.profile && cache.profile.role === 'admin'; }

/* ---------------------------------------------------------
   3. DATA ACCESS (Supabase)
--------------------------------------------------------- */
async function refreshSession(){
  const { data } = await sb.auth.getSession();
  cache.session = data.session || null;
  if(cache.session){
    const { data: profile, error } = await sb.from('profiles').select('*').eq('id', cache.session.user.id).single();
    cache.profile = error ? null : profile;
  } else {
    cache.profile = null;
  }
}

async function fetchListings(){
  const { data, error } = await sb
    .from('listings')
    .select('*, listing_images(url, position), reviews(id, user_id, username, rating, comment, created_at)')
    .order('created_at', { ascending:false });
  if(error){ console.error(error); toast('Could not load listings: ' + friendlyError(error)); cache.listings = []; return; }
  cache.listings = (data||[]).map(function(l){
    const images = (l.listing_images||[]).slice().sort((a,b)=>a.position-b.position).map(x=>x.url);
    const reviews = (l.reviews||[]).slice().sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));
    return Object.assign({}, l, { images: images, reviews: reviews });
  });
}
async function fetchHome(){
  const { data, error } = await sb.from('home_blocks').select('*').order('position', { ascending:true });
  if(error){ console.error(error); cache.home = []; return; }
  cache.home = data || [];
}
async function fetchShopInfo(){
  const { data, error } = await sb.from('shop_info').select('*').eq('id', 1).single();
  if(error){ console.error(error); cache.shopInfo = {}; return; }
  cache.shopInfo = data || {};
}
async function loadPublicData(){
  await Promise.all([fetchListings(), fetchHome(), fetchShopInfo()]);
}

/* ---------------------------------------------------------
   4. IMAGE HELPERS (resize in-browser, then upload to Storage)
--------------------------------------------------------- */
function resizeFileToBlob(file, maxDim, quality){
  maxDim = maxDim || 1000; quality = quality || 0.75;
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob){ blob ? resolve(blob) : reject(new Error('Could not process image')); }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadOneImage(file, folder){
  const blob = await resizeFileToBlob(file, 1100, 0.76);
  const path = folder + '/' + uid('img') + '.jpg';
  const { error } = await sb.storage.from('ctbb-media').upload(path, blob, { contentType:'image/jpeg', upsert:false });
  if(error){ throw error; }
  const { data } = sb.storage.from('ctbb-media').getPublicUrl(path);
  return data.publicUrl;
}
async function uploadImages(files, folder){
  const urls = [];
  for(const f of files){
    try{ urls.push(await uploadOneImage(f, folder)); }
    catch(e){ console.error('image upload failed', e); toast('A photo failed to upload: ' + friendlyError(e)); }
  }
  return urls;
}

/* ---------------------------------------------------------
   5. RENDER: SHELL
--------------------------------------------------------- */
function bikeMarkSVG(){
  return '<svg class="brand-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">'
  + '<circle cx="12" cy="34" r="8" stroke="currentColor" stroke-width="2.4" class="gearlogo"/>'
  + '<circle cx="36" cy="34" r="8" stroke="currentColor" stroke-width="2.4" class="gearlogo"/>'
  + '<path d="M12 34L21 15H29" stroke="currentColor" stroke-width="2.4" class="gearlogo" stroke-linecap="round"/>'
  + '<path d="M21 15L29 34H12" stroke="currentColor" stroke-width="2.4" class="gearlogo" stroke-linecap="round" stroke-linejoin="round"/>'
  + '<path d="M29 15L36 34" stroke="currentColor" stroke-width="2.4" class="gearlogo" stroke-linecap="round"/>'
  + '<circle cx="21" cy="15" r="2.4" fill="currentColor" class="gearlogo"/>'
  + '</svg>';
}
function cableDividerSVG(){
  let lines = '';
  for(let i=0;i<14;i++){
    const x = i*90 - 20;
    lines += '<line x1="'+x+'" y1="0" x2="'+(x+45)+'" y2="14" stroke="var(--line-strong)" stroke-width="1"/>';
  }
  return '<div class="cable-divider"><svg viewBox="0 0 1180 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'+lines+'</svg></div>';
}
function gearIconSVG(){
  var teeth = '';
  for(var i=0;i<8;i++){
    var angle = i*45;
    teeth += '<rect x="10.75" y="1.4" width="2.5" height="3.4" rx="0.6" fill="currentColor" transform="rotate('+angle+' 12 12)"/>';
  }
  return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">'
  + teeth
  + '<circle cx="12" cy="12" r="6.4" fill="none" stroke="currentColor" stroke-width="1.6"/>'

function renderMain(){
  const main = document.getElementById('main');
  if(route.tab==='home') main.innerHTML = renderHomeTab();
  else if(route.tab==='bikes') main.innerHTML = renderCatalogTab('bike','Bikes','Refurbished, ready to ride.');
  else if(route.tab==='scooters') main.innerHTML = renderCatalogTab('scooter','Scooters','Light, quick, and city-ready.');
  else if(route.tab==='listing') main.innerHTML = renderListingDetail(route.listingId);
  else if(route.tab==='sell') main.innerHTML = renderSellForm();
  else if(route.tab==='editlisting') main.innerHTML = renderEditListingForm(route.listingId);
  else if(route.tab==='mylistings') main.innerHTML = renderMyListings();
  else main.innerHTML = renderHomeTab();

  if(route.tab==='sell' || route.tab==='editlisting') attachSellFormPreview();
}

function renderHomeTab(){
  const editing = uiCache.editingHome && isAdmin();
  const blocks = editing ? uiCache.homeDraft : cache.home;

  let blocksHtml = blocks.map(function(b, i){
    const controls = editing ? renderBlockControls(i, blocks.length) : '';
    const cls = editing ? 'hp-block editing' : 'hp-block';
    let inner = '';
    if(b.type==='heading'){
      inner = '<h1 class="hp-heading" '+(editing?'contenteditable="true" data-hb="'+i+'"':'')+'>'+escapeHtml(b.content)+'</h1>';
    } else if(b.type==='text'){
      inner = '<div class="wrap"><p class="hp-text" '+(editing?'contenteditable="true" data-hb="'+i+'"':'')+'>'+escapeHtml(b.content)+'</p></div>';
    } else if(b.type==='image'){
      inner = '<div class="wrap hp-image">' + (b.content
          ? '<img src="'+b.content+'" alt="">'
          : '<div class="thumb-empty" style="border-radius:14px;aspect-ratio:16/6;">No image yet</div>')
        + (editing ? '<div style="text-align:center;margin-top:8px;"><button class="btn ghost small" data-action="hb-replace-image" data-idx="'+i+'">Replace Image</button></div>' : '')
        + '</div>';
    } else if(b.type==='divider'){
      inner = '<div class="wrap hp-divider"><hr class="rule"></div>';
    }
    return '<div class="'+cls+'">' + controls + inner + '</div>';
  }).join('');

  let editBar = '';
  if(isAdmin()){
    if(editing){
      editBar = '<div class="wrap add-block-bar">'
        + '<button class="btn small" data-action="hb-add" data-type="heading">+ Heading</button>'
        + '<button class="btn small" data-action="hb-add" data-type="text">+ Paragraph</button>'
        + '<button class="btn small" data-action="hb-add" data-type="image">+ Image</button>'
        + '<button class="btn ghost small" data-action="hb-add" data-type="divider">+ Divider</button>'
        + '<span style="flex-basis:100%;height:0;"></span>'
        + '<button class="btn secondary" data-action="hb-save">Save Page</button>'
        + '<button class="btn ghost" data-action="hb-cancel">Cancel</button>'
        + '</div>';
    } else {
      editBar = '<div class="wrap" style="text-align:center;padding:14px 0 34px;">'
        + '<button class="btn secondary" data-action="hb-edit">Edit Home Page</button>'
        + '</div>';
    }
  }

  return '<div class="hero">' + (blocksHtml || '<div class="empty-state">Home page is empty.</div>') + '</div>' + editBar + renderFeaturedStrip();
}
function renderBlockControls(i, total){
  return '<div class="edit-controls">'
    + '<button data-action="hb-up" data-idx="'+i+'" '+(i===0?'disabled':'')+'>&uarr; Up</button>'
    + '<button data-action="hb-down" data-idx="'+i+'" '+(i===total-1?'disabled':'')+'>&darr; Down</button>'
    + '<button data-action="hb-delete" data-idx="'+i+'">Delete</button>'
    + '</div>';
}
function renderFeaturedStrip(){
  const featured = cache.listings.filter(l=>!l.sold).slice(0,3);
  if(!featured.length) return '';
  return '<div class="wrap section-tight"><span class="eyebrow">Just Listed</span>'
    + '<div class="grid">' + featured.map(renderListingCard).join('') + '</div></div>';
}

function renderCatalogTab(category, title, subtitle){
  const items = cache.listings.filter(l=>l.category===category);
  const body = items.length
    ? '<div class="grid">' + items.map(renderListingCard).join('') + '</div>'
    : '<div class="empty-state">No '+title.toLowerCase()+' listed yet. Check back soon.</div>';
  return '<div class="wrap section">'
    + '<span class="eyebrow">'+items.length+' available</span>'
    + '<h2 style="font-size:32px;margin-bottom:4px;">'+title+'</h2>'
    + '<p style="color:var(--ink-soft);margin:0 0 24px;">'+subtitle+'</p>'
    + body + '</div>';
}
function avgRating(l){
  if(!l.reviews || !l.reviews.length) return null;
  const sum = l.reviews.reduce((a,r)=>a+r.rating,0);
  return sum / l.reviews.length;
}
function starsHtml(avg, count){
  if(avg===null) return '<span class="stars" style="color:var(--ink-soft);">No reviews yet</span>';
  const full = Math.round(avg);
  let s = '';
  for(let i=1;i<=5;i++) s += (i<=full) ? '&#9733;' : '&#9734;';
  return '<span class="stars">'+s+'</span> <span style="color:var(--ink-soft);font-size:12px;">('+count+')</span>';
}
function renderListingCard(l){
  const img = l.images && l.images[0];
  const avg = avgRating(l);
  return '<div class="card" data-action="open-listing" data-id="'+l.id+'" style="cursor:pointer;">'
    + '<div class="card-media">'
    +   (l.sold ? '<div class="sold-ribbon">SOLD</div>' : '')
    +   (img ? '<img class="thumb" src="'+img+'" alt="">' : '<div class="thumb-empty">No photo</div>')
    + '</div>'
    + '<div class="card-body">'
    +   '<div class="card-title">'+escapeHtml(l.title)+'</div>'
    +   '<div>'+starsHtml(avg, (l.reviews||[]).length)+'</div>'
    +   '<div class="card-meta"><span class="hangtag">'+fmtPrice(l.price)+'</span><span>'+escapeHtml(l.category==='bike'?'Bike':'Scooter')+'</span></div>'
    + '</div>'
    + '</div>';
}

function renderListingDetail(id){
  const l = cache.listings.find(x=>x.id===id);
  if(!l) return '<div class="wrap section"><div class="empty-state">Listing not found.<br><button class="btn" data-action="nav" data-tab="bikes">Back to Bikes</button></div></div>';

  const imgs = (l.images && l.images.length) ? l.images : [];
  const gi = Math.min(uiCache.galleryIndex||0, Math.max(imgs.length-1,0));
  const mainImg = imgs.length ? imgs[gi] : null;

  const gallery = '<div>'
    + (mainImg ? '<img class="gallery-main" src="'+mainImg+'" alt="">' : '<div class="thumb-empty" style="border-radius:12px;aspect-ratio:4/3;">No photo</div>')
    + (imgs.length>1 ? '<div class="gallery-thumbs">' + imgs.map((src,i)=>'<img src="'+src+'" class="'+(i===gi?'active':'')+'" data-action="gallery-select" data-idx="'+i+'">').join('') + '</div>' : '')
    + '</div>';

  const avg = avgRating(l);
  const owner = currentUser() && (currentUser().username === l.seller || isAdmin());

  let manageBtns = '';
  if(owner){
    manageBtns = '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">'
      + '<button class="btn ghost small" data-action="edit-listing" data-id="'+l.id+'">Edit Listing</button>'
      + '<button class="btn ghost small" data-action="toggle-sold" data-id="'+l.id+'">'+(l.sold?'Mark Available':'Mark as Sold')+'</button>'
      + '<button class="btn danger small" data-action="delete-listing" data-id="'+l.id+'">Delete Listing</button>'
      + '</div>';
  }

  let buyBox = '';
  if(!l.sold){
    buyBox = '<div class="form-card" style="margin-top:20px;padding:20px;">'
      + '<h3 style="margin-bottom:10px;">Interested?</h3>'
      + '<p style="color:var(--ink-soft);font-size:14px;margin:0 0 14px;">Reserve this '+ (l.category==='bike'?'bike':'scooter') +' and we\'ll contact you to arrange pickup and payment.</p>'
      + (l.reserved_by
          ? '<div class="badge" style="margin-bottom:10px;">Reserved by '+escapeHtml(l.reserved_by)+'</div><br>'
          : '')
      + '<button class="btn" data-action="reserve-listing" data-id="'+l.id+'">Reserve This '+(l.category==='bike'?'Bike':'Scooter')+'</button>'
      + '</div>';
  } else {
    buyBox = '<div class="badge" style="margin-top:20px;">This item has been sold</div>';
  }

  const reviewsHtml = renderReviews(l);

  return '<div class="wrap section">'
    + '<button class="btn ghost small" data-action="nav" data-tab="'+(l.category==='bike'?'bikes':'scooters')+'" style="margin-bottom:20px;">&larr; Back</button>'
    + '<div class="detail-grid">'
    +   '<div>' + gallery + '</div>'
    +   '<div>'
    +     '<span class="eyebrow">'+ (l.category==='bike'?'Bike':'Scooter') +'</span>'
    +     '<h1 style="font-size:30px;">'+escapeHtml(l.title)+'</h1>'
    +     '<div style="margin:10px 0;">'+starsHtml(avg,(l.reviews||[]).length)+'</div>'
    +     '<div class="hangtag" style="font-size:20px;margin-bottom:16px;">'+fmtPrice(l.price)+'</div>'
    +     (l.condition ? '<div class="badge" style="margin-bottom:12px;">'+escapeHtml(l.condition)+'</div>' : '')
    +     '<p style="color:var(--ink);white-space:pre-wrap;">'+escapeHtml(l.description)+'</p>'
    +     '<p style="color:var(--ink-soft);font-size:13px;">Listed by '+escapeHtml(l.seller)+' on '+fmtDate(l.created_at)+'</p>'
    +     manageBtns + buyBox
    +   '</div>'
    + '</div>'
    + '<hr class="rule">'
    + reviewsHtml
    + '</div>';
}
function renderReviews(l){
  const u = currentUser();
  let formHtml = '';
  if(u){
    formHtml = '<form id="review-form" data-id="'+l.id+'" style="max-width:480px;margin-bottom:20px;">'
      + '<label>Your rating</label>'
      + '<div class="star-picker" id="star-picker">' + [1,2,3,4,5].map(n=>'<button type="button" class="on" data-action="pick-star" data-val="'+n+'">&#9733;</button>').join('') + '</div>'
      + '<input type="hidden" name="rating" id="rating-input" value="5">'
      + '<label style="margin-top:12px;">Your review</label>'
      + '<textarea name="comment" placeholder="How was the bike / the buying experience?" required></textarea>'
      + '<button class="btn" type="submit">Post Review</button>'
      + '</form>';
  } else {
    formHtml = '<p class="helptext">Log in to leave a review.</p>';
  }
  const list = (l.reviews||[]).map(function(r){
    let s=''; for(let i=1;i<=5;i++) s += i<=r.rating?'&#9733;':'&#9734;';
    const canDelete = u && cache.session && (cache.session.user.id === r.user_id || isAdmin());
    return '<div class="review"><div class="review-head"><strong style="color:var(--ink);">'+escapeHtml(r.username)+'</strong><span>'+fmtDate(r.created_at)+(canDelete?' &middot; <a href="#" data-action="delete-review" data-id="'+r.id+'" style="color:var(--danger);">Delete</a>':'')+'</span></div>'
      + '<div class="stars">'+s+'</div><p style="margin:6px 0 0;">'+nl2br(r.comment)+'</p></div>';
  }).join('') || '<p class="helptext">No reviews yet \u2014 be the first.</p>';

  return '<h3>Reviews</h3>' + formHtml + list;
}

}
function openSettingsModal(){
  const u = currentUser();
  let adminSection = '';
  if(u && u.role==='admin'){
    adminSection = '<hr class="rule"><h3>Shop Contact Info</h3>'
      + '<form id="shopinfo-form">'
      +  '<label>Email</label><input type="text" name="email" value="'+escapeHtml(cache.shopInfo.email||'')+'">'
      +  '<label>Phone</label><input type="text" name="phone" value="'+escapeHtml(cache.shopInfo.phone||'')+'">'
      +  '<label>Location</label><input type="text" name="location" value="'+escapeHtml(cache.shopInfo.location||'')+'">'
      +  '<label>Hours</label><input type="text" name="hours" value="'+escapeHtml(cache.shopInfo.hours||'')+'">'
      +  '<button class="btn secondary" type="submit">Save Shop Info</button>'
      + '</form>';
  }
  let acctSection = '';
  if(u){
    acctSection = '<hr class="rule"><h3>Change Password</h3>'
      + '<form id="password-form">'
      +   '<label>Current password</label><input type="password" name="current" required>'
      +   '<label>New password</label><input type="password" name="next" required minlength="6">'
      +   '<button class="btn secondary" type="submit">Update Password</button>'
      + '</form>';
  }
  openModal(
    '<h2 style="margin-bottom:10px;">Settings</h2>'
    + '<div class="settings-row"><span>Dark mode</span>'
    +   '<div class="switch"><div class="switch-track" data-action="toggle-theme"><div class="switch-thumb"></div></div></div>'
    + '</div>'
    + adminSection + acctSection
  );
}

/* ---------------------------------------------------------
   8. ACTIONS: auth
--------------------------------------------------------- */
async function doLogin(email, password){
  const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
  if(error){ toast(friendlyError(error)); return false; }
  await refreshSession();
  toast('Welcome back, ' + cache.profile.username + '.');
  return true;
}
async function doSignup(email, username, password){
  username = username.trim();
  email = email.trim();
  if(!/^[a-zA-Z0-9_. -]{3,30}$/.test(username)){ toast('Please use a simple display name (letters, numbers, spaces, 3-30 chars).'); return false; }
  const { data: existing } = await sb.from('profiles').select('username').ilike('username', username).maybeSingle();
  if(existing){ toast('That display name is already taken.'); return false; }
  const { error } = await sb.auth.signUp({ email, password, options:{ data:{ username: username } } });
  if(error){ toast(friendlyError(error)); return false; }
  await refreshSession();
  if(!cache.profile){
    openVerifyCodeModal(email);
    return false;
  }
  toast('Account created \u2014 welcome, ' + username + '.');
  return true;
}
async function resendCode(email){
  const { error } = await sb.auth.resend({ type:'signup', email: email });
  if(error){ toast('Could not resend: ' + friendlyError(error)); return; }
  toast('Code resent \u2014 check your email.');
}
async function doLogout(){
  await sb.auth.signOut();
  cache.session = null; cache.profile = null;
  route = {tab:'home', listingId:null};
  toast('Logged out.');
}
async function doOAuthLogin(provider){
  const { error } = await sb.auth.signInWithOAuth({ provider: provider, options: { redirectTo: window.location.origin + window.location.pathname } });
  if(error){ toast('Could not start sign-in: ' + friendlyError(error)); }
}

/* ---------------------------------------------------------
   9. ACTIONS: home page editing
--------------------------------------------------------- */
function startHomeEdit(){
  uiCache.editingHome = true;
  uiCache.homeDraft = cache.home.map(b=>Object.assign({}, b));
  renderMain();
}
function cancelHomeEdit(){
  uiCache.editingHome = false;
  uiCache.homeDraft = null;
  renderMain();
}
function syncDraftFromDom(){
  document.querySelectorAll('[data-hb]').forEach(function(el){
    const idx = Number(el.getAttribute('data-hb'));
    if(uiCache.homeDraft[idx]) uiCache.homeDraft[idx].content = el.textContent.trim();
  });
}
async function saveHomeEdit(){
  syncDraftFromDom();
  const draft = uiCache.homeDraft;
  setBusy(true);
  try{
    const { error: delErr } = await sb.from('home_blocks').delete().gte('position', -1);
    if(delErr) throw delErr;
    if(draft.length){
      const rows = draft.map((b,i)=>({ position:i, type:b.type, content:b.content||'' }));
      const { error: insErr } = await sb.from('home_blocks').insert(rows);
      if(insErr) throw insErr;
    }
    await fetchHome();
    uiCache.editingHome = false;
    uiCache.homeDraft = null;
    toast('Home page saved.');
  }catch(e){ toast('Could not save: ' + friendlyError(e)); }
  setBusy(false);
  renderMain();
}
function addHomeBlock(type){
  syncDraftFromDom();
  uiCache.homeDraft.push({ type:type, content: type==='heading' ? 'New Heading' : (type==='text' ? 'New paragraph text \u2014 click to edit.' : '') });
  renderMain();
}
function moveHomeBlock(idx, dir){
  syncDraftFromDom();
  const arr = uiCache.homeDraft;
  const j = idx + dir;
  if(j<0 || j>=arr.length) return;
  const tmp = arr[idx]; arr[idx] = arr[j]; arr[j] = tmp;
  renderMain();
}
function deleteHomeBlock(idx){
  syncDraftFromDom();
  uiCache.homeDraft.splice(idx,1);
  renderMain();
}
async function replaceHomeImage(idx, file){
  syncDraftFromDom();
  setBusy(true);
  try{
    const url = await uploadOneImage(file, 'home');
    uiCache.homeDraft[idx].content = url;
  }catch(e){ toast('Upload failed: ' + friendlyError(e)); }
  setBusy(false);
  renderMain();
}

/* ---------------------------------------------------------
   10. ACTIONS: listings
--------------------------------------------------------- */
function attachSellFormPreview(){
  uiCache.pendingFiles = [];
  uiCache.pendingPreviewUrls.forEach(u=>URL.revokeObjectURL(u));
  uiCache.pendingPreviewUrls = [];
  const input = document.getElementById('sell-images');
  if(!input) return;
  input.addEventListener('change', function(){
    Array.from(input.files).forEach(function(f){
      uiCache.pendingFiles.push(f);
      uiCache.pendingPreviewUrls.push(URL.createObjectURL(f));
    });
    input.value = '';
    renderSellPreview();
  });
}
function renderSellPreview(){
  const wrap = document.getElementById('sell-preview');
  if(!wrap) return;
  wrap.innerHTML = uiCache.pendingPreviewUrls.map(function(src,i){
    return '<div class="preview-thumb"><img src="'+src+'"><button type="button" class="rm" data-action="rm-preview" data-idx="'+i+'">&times;</button></div>';
  }).join('');
}
function setBusy(b){ uiCache.busy = b; }
async function createListing(data){
  setBusy(true);
  const btn = document.getElementById('sell-submit-btn');
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Publishing\u2026'; }
  try{
    const { data: row, error } = await sb.from('listings').insert({
      category: data.category, title: data.title.trim(), price: Number(data.price)||0,
      description: data.description.trim(), condition: (data.condition||'').trim(),
      seller: cache.profile.username
    }).select().single();
    if(error) throw error;

    if(uiCache.pendingFiles.length){
      const urls = await uploadImages(uiCache.pendingFiles, 'listings');
      if(urls.length){
        const rows = urls.map((url,i)=>({ listing_id: row.id, url, position:i }));
        const { error: imgErr } = await sb.from('listing_images').insert(rows);
        if(imgErr) console.error(imgErr);
      }
    }
    uiCache.pendingFiles = [];
    uiCache.pendingPreviewUrls.forEach(u=>URL.revokeObjectURL(u));
    uiCache.pendingPreviewUrls = [];
    await fetchListings();
    toast('Listing published.');
    route = { tab:'listing', listingId: row.id };
    renderShell();
  }catch(e){
    toast('Could not publish listing: ' + friendlyError(e));
    if(btn){ btn.disabled = false; btn.textContent = 'Publish Listing'; }
  }
  setBusy(false);
}
async function deleteListing(id){
  if(!confirm('Delete this listing? This cannot be undone.')) return;
  const { error } = await sb.from('listings').delete().eq('id', id);
  if(error){ toast('Could not delete: ' + friendlyError(error)); return; }
  await fetchListings();
  route = { tab: route.tab==='listing' ? 'mylistings' : route.tab, listingId:null };
  toast('Listing deleted.');
  renderShell();
}
async function updateListing(id, data){
  setBusy(true);
  const btn = document.getElementById('sell-submit-btn');
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Saving\u2026'; }
  try{
    const { error } = await sb.from('listings').update({
      category: data.category, title: data.title.trim(), price: Number(data.price)||0,
      description: data.description.trim(), condition: (data.condition||'').trim()
    }).eq('id', id);
    if(error) throw error;
    if(uiCache.pendingFiles.length){
      const existing = cache.listings.find(x=>x.id===id);
      const existingCount = existing ? existing.images.length : 0;
      const urls = await uploadImages(uiCache.pendingFiles, 'listings');
      if(urls.length){
        const rows = urls.map((url,i)=>({ listing_id:id, url, position: existingCount+i }));
        const { error: imgErr } = await sb.from('listing_images').insert(rows);
        if(imgErr) console.error(imgErr);
      }
    }
    uiCache.pendingFiles = [];
    uiCache.pendingPreviewUrls.forEach(u=>URL.revokeObjectURL(u));
    uiCache.pendingPreviewUrls = [];
    await fetchListings();
    toast('Listing updated.');
    route = { tab:'listing', listingId:id };
    renderShell();
  }catch(e){
    toast('Could not save changes: ' + friendlyError(e));
    if(btn){ btn.disabled = false; btn.textContent = 'Save Changes'; }
  }
  setBusy(false);
}
async function removeExistingImage(listingId, encodedUrl){
  const url = decodeURIComponent(encodedUrl);
  const { error } = await sb.from('listing_images').delete().eq('listing_id', listingId).eq('url', url);
  if(error){ toast('Could not remove photo: ' + friendlyError(error)); return; }
  await fetchListings();
  renderMain();
}
async function toggleSold(id){
  const l = cache.listings.find(x=>x.id===id);
  if(!l) return;
  const { error } = await sb.from('listings').update({ sold: !l.sold }).eq('id', id);
  if(error){ toast('Could not update: ' + friendlyError(error)); return; }
  await fetchListings();
  renderMain();
}
async function reserveListing(id){
  const u = currentUser();
  if(!u){ openLoginModal(); toast('Log in to reserve this item.'); return; }
  const { error } = await sb.rpc('reserve_listing', { p_listing_id: id });
  if(error){ toast('Could not reserve: ' + friendlyError(error)); return; }
  await fetchListings();
  const contact = cache.shopInfo.email || cache.shopInfo.phone || 'the shop';
  openModal('<h2>Reserved</h2><p>Thanks, '+escapeHtml(u.username)+'! This item is reserved under your account. '
    + 'The shop will reach out via '+escapeHtml(contact)+' to arrange pickup and payment.</p>'
    + '<button class="btn" data-action="close-modal">Done</button>');
  renderMain();
}
async function postReview(listingId, rating, comment){
  const u = currentUser();
  if(!u) return;
  const { error } = await sb.from('reviews').insert({
    listing_id: listingId, user_id: cache.session.user.id, username: u.username,
    rating: Number(rating)||5, comment: comment.trim()
  });
  if(error){ toast('Could not post review: ' + friendlyError(error)); return; }
  await fetchListings();
  toast('Review posted.');
  renderMain();
}
async function deleteReview(reviewId){
  if(!confirm('Delete this review?')) return;
  const { error } = await sb.from('reviews').delete().eq('id', reviewId);
  if(error){ toast('Could not delete: ' + friendlyError(error)); return; }
  await fetchListings();
  toast('Review deleted.');
  renderMain();
}

/* ---------------------------------------------------------
   11. EVENT DELEGATION
--------------------------------------------------------- */
document.addEventListener('click', function(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.getAttribute('data-action');

  switch(action){
    case 'nav':
      route = { tab: t.getAttribute('data-tab'), listingId:null };
      uiCache.galleryIndex = 0;
      renderShell();
      loadPublicData().then(renderMain);
      break;
    case 'open-listing':
      route = { tab:'listing', listingId: t.getAttribute('data-id') };
      uiCache.galleryIndex = 0;
      renderShell();
      break;
    case 'gallery-select':
      uiCache.galleryIndex = Number(t.getAttribute('data-idx'));
      renderMain();
      break;
    case 'open-login': openLoginModal(); break;
    case 'open-signup': openSignupModal(); break;
    case 'switch-signup': openSignupModal(); break;
    case 'open-settings': openSettingsModal(); break;
    case 'close-modal': closeModal(); break;
    case 'close-modal-bg': if(e.target.classList.contains('overlay')) closeModal(); break;
    case 'logout': doLogout().then(renderShell); break;
    case 'oauth-login': doOAuthLogin(t.getAttribute('data-provider')); break;
    case 'resend-code': resendCode(t.getAttribute('data-email')); break;
    case 'toggle-theme': toggleTheme(); break;

    case 'hb-edit': startHomeEdit(); break;
    case 'hb-cancel': cancelHomeEdit(); break;
    case 'hb-save': saveHomeEdit(); break;
    case 'hb-add': addHomeBlock(t.getAttribute('data-type')); break;
    case 'hb-up': moveHomeBlock(Number(t.getAttribute('data-idx')), -1); break;
    case 'hb-down': moveHomeBlock(Number(t.getAttribute('data-idx')), 1); break;
    case 'hb-delete': deleteHomeBlock(Number(t.getAttribute('data-idx'))); break;
    case 'hb-replace-image': {
      const idx = Number(t.getAttribute('data-idx'));
      const inp = document.createElement('input');
      inp.type='file'; inp.accept='image/*';
      inp.onchange = function(){ if(inp.files[0]) replaceHomeImage(idx, inp.files[0]); };
      inp.click();
      break;
    }

    case 'trigger-file': {
      const inp = t.querySelector('input[type=file]');
      if(inp) inp.click();
      break;
    }
    case 'rm-preview': {
      const idx = Number(t.getAttribute('data-idx'));
      URL.revokeObjectURL(uiCache.pendingPreviewUrls[idx]);
      uiCache.pendingFiles.splice(idx,1);
      uiCache.pendingPreviewUrls.splice(idx,1);
      renderSellPreview();
      break;
    }
    case 'toggle-sold': toggleSold(t.getAttribute('data-id')); break;
    case 'delete-listing': deleteListing(t.getAttribute('data-id')); break;
    case 'edit-listing': route = { tab:'editlisting', listingId: t.getAttribute('data-id') }; renderShell(); break;
    case 'remove-existing-image': removeExistingImage(t.getAttribute('data-id'), t.getAttribute('data-url')); break;
    case 'reserve-listing': reserveListing(t.getAttribute('data-id')); break;
    case 'delete-review': deleteReview(t.getAttribute('data-id')); break;
    case 'pick-star': {
      const val = t.getAttribute('data-val');
      document.getElementById('rating-input').value = val;
      document.querySelectorAll('#star-picker button').forEach(function(b,i){
        b.classList.toggle('on', (i+1) <= Number(val));
      });
      break;
    }
  }
});

document.addEventListener('submit', function(e){
  const form = e.target;
  e.preventDefault();

  if(form.id === 'login-form'){
    const fd = new FormData(form);
    const btn = document.getElementById('login-btn');
    if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Logging in\u2026'; }
    doLogin(fd.get('email'), fd.get('password')).then(function(ok){
      if(ok){ closeModal(); renderShell(); }
      else if(btn){ btn.disabled = false; btn.textContent = 'Log In'; }
    });
  }
  else if(form.id === 'signup-form'){
    const fd = new FormData(form);
    const btn = document.getElementById('signup-btn');
    if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Signing up\u2026'; }
    doSignup(fd.get('email'), fd.get('username'), fd.get('password')).then(function(ok){
      if(ok){ closeModal(); renderShell(); }
      else if(btn){ btn.disabled = false; btn.textContent = 'Sign Up'; }
    });
  }
  else if(form.id === 'password-form'){
    const fd = new FormData(form);
    const u = currentUser();
    if(!u) return;
    (async function(){
      const email = cache.session.user.email;
      const { error: verifyErr } = await sb.auth.signInWithPassword({ email, password: fd.get('current') });
      if(verifyErr){ toast('Current password is incorrect.'); return; }
      const { error } = await sb.auth.updateUser({ password: fd.get('next') });
      if(error){ toast('Could not update password: ' + friendlyError(error)); return; }
      toast('Password updated.');
      closeModal();
    })();
  }
  else if(form.id === 'shopinfo-form'){
    const fd = new FormData(form);
    (async function(){
      const { error } = await sb.from('shop_info').update({
        email: fd.get('email'), phone: fd.get('phone'), location: fd.get('location'), hours: fd.get('hours')
      }).eq('id', 1);
      if(error){ toast('Could not save: ' + friendlyError(error)); return; }
      await fetchShopInfo();
      toast('Shop info updated.');
      closeModal();
      renderShell();
    })();
  }
  else if(form.id === 'sell-form'){
    const editingId = form.getAttribute('data-editing');
    const fd = new FormData(form);
    if(editingId){
      updateListing(editingId, {
        category: fd.get('category'), title: fd.get('title'), price: fd.get('price'),
        description: fd.get('description'), condition: fd.get('condition')
      });
    } else {
      if(!uiCache.pendingFiles.length && !confirm('Publish this listing without any photos?')) return;
      createListing({
        category: fd.get('category'), title: fd.get('title'), price: fd.get('price'),
        description: fd.get('description'), condition: fd.get('condition')
      });
    }
  }
  else if(form.id === 'review-form'){
    const fd = new FormData(form);
    postReview(form.getAttribute('data-id'), fd.get('rating'), fd.get('comment'));
    form.reset();
  }
  else if(form.id === 'verify-form'){
    const fd = new FormData(form);
    const email = form.getAttribute('data-email');
    const btn = document.getElementById('verify-btn');
    if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Verifying\u2026'; }
    (async function(){
      const { error } = await sb.auth.verifyOtp({ email: email, token: fd.get('code'), type:'signup' });
      if(error){ toast(friendlyError(error)); if(btn){ btn.disabled=false; btn.textContent='Verify & Continue'; } return; }
      await refreshSession();
      toast('Email verified \u2014 welcome!');
      closeModal();
      renderShell();
    })();
  }
  else if(form.id === 'setpw-form'){
    const fd = new FormData(form);
    const btn = document.getElementById('setpw-btn');
    if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Saving\u2026'; }
    (async function(){
      const { error } = await sb.auth.updateUser({ password: fd.get('password') });
      if(error){ toast('Could not set password: ' + friendlyError(error)); if(btn){ btn.disabled=false; btn.textContent='Save Password'; } return; }
      const { error: rpcErr } = await sb.rpc('mark_password_set');
      if(rpcErr) console.error(rpcErr);
      if(cache.profile) cache.profile.has_password = true;
      toast('Password set.');
      closeModal();
    })();
  }
});

/* ---------------------------------------------------------
   12. THEME
--------------------------------------------------------- */
function applyTheme(){ document.documentElement.setAttribute('data-theme', settings.theme==='dark' ? 'dark' : 'light'); }
function toggleTheme(){
  settings.theme = settings.theme==='dark' ? 'light' : 'dark';
  localStorage.setItem('ctbb_theme', settings.theme);
  applyTheme();
}

/* ---------------------------------------------------------
   13. INIT
--------------------------------------------------------- */
async function init(){
  applyTheme();
  if(NOT_CONFIGURED){ renderSetupScreen(); return; }

  document.getElementById('app').innerHTML = '<div class="empty-state" style="padding:120px 20px;"><span class="spinner" style="width:20px;height:20px;color:var(--ink);"></span> Loading CT Bridge Bikes\u2026</div>';

  try{
    await refreshSession();
    await loadPublicData();
  }catch(e){
    console.error(e);
  }

  sb.auth.onAuthStateChange(function(){ /* session is re-read via refreshSession() around actions; nothing to do here */ });

  renderShell();
  if(cache.profile && cache.profile.has_password === false){
    openSetPasswordModal();
  }
}
init();

})();
